name: Bot Listener
on:
  schedule:
    - cron: "*/345 * * * *"   # restart ogni ~5h45m per stare sotto i 6h job limit
  workflow_dispatch:

# Job long-running con re-trigger automatico.
permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 350    # 5h50m
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Polling
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:         src
        run: timeout 340m python -m bot || true
