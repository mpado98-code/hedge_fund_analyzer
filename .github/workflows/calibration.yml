name: Calibration Backtest
on:
  schedule:
    - cron: "0 3 1 * *"      # 1° del mese, 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Ensure data dir
        run: mkdir -p data
      - name: Calibration
        env:
          PYTHONPATH: src
        run: python -m calibration_runner
      - name: Commit calibration
        if: always()
        run: |
          git config user.name  "hedgefund-bot"
          git config user.email "bot@noreply.local"
          git add data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "calibration: $(dat
