name: Performance Tracker
on:
  schedule:
    - cron: "0 21 * * 5"    # ven 21:00 UTC = 23:00 ITA
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:         src
        run: python -m tracker
      - name: Commit positions
        if: always()
        shell: bash
        run: |
          git config user.name "hedgefund-bot"
          git config user.email "bot@noreply.local"
          git add -A
          git commit -m 'daily auto update' || echo 'nothing to commit'
          git push || echo 'push failed'
          exit 0
