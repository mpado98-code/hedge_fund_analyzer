name: Daily Refresh
on:
  schedule:
    - cron: "30 5 * * 1-5"   # 05:30 UTC = 07:30 ITA, lun-ven
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Daily refresh
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH:         src
        run: python -m daily_refresh
      - name: Commit prices
        if: always()
        run: |
          git config user.name  "hedgefund-bot"
          git config user.email "bot@noreply.local"
          git add data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "daily: $(date -u +
